name: Documentation

# Build the DocC site and publish it to GitHub Pages on every push to main.
# One-time setup: repository Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL
        run: apt-get update && apt-get install -y libssl-dev pkg-config

      - name: Build the DocC site
        env:
          PERUN_BUILD_DOCS: "1"
        run: |
          swift package --allow-writing-to-directory "$PWD/_site" \
            generate-documentation \
            --target PerunPGSQL \
            --transform-for-static-hosting \
            --hosting-base-path perun-pgsql \
            --output-path "$PWD/_site"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
