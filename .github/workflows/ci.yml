name: CI

# Compile the whole package and run the tests on Linux, so a change that builds on
# macOS but breaks on Linux — or breaks a test — is caught before it lands.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same branch or PR cancels an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Proves the whole package compiles on Linux (library, demo and Examples) and that the
  # unit tests pass. No database: the integration tests skip themselves unless
  # PERUN_PGSQL_INTEGRATION=1, so this job needs nothing external.
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL
        run: apt-get update && apt-get install -y libssl-dev pkg-config

      - name: Build everything (library, demo, examples, tests)
        run: swift build --build-tests

      - name: Run unit tests
        run: swift test

  # Runs the full suite — unit plus integration — against a real PostgreSQL 17, reachable
  # inside the job container at the service's hostname (`postgres`), not localhost.
  integration:
    name: Integration tests (PostgreSQL 17)
    runs-on: ubuntu-latest
    container: swift:6.0
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: perun
          POSTGRES_DB: perun
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U perun -d perun"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL
        run: apt-get update && apt-get install -y libssl-dev pkg-config

      - name: Run the full suite against live PostgreSQL
        env:
          PERUN_PGSQL_INTEGRATION: "1"
          PGHOST: postgres
          PGPORT: "5432"
          PGUSER: perun
          PGDATABASE: perun
          PGSSLMODE: disable
        run: swift test

  # The suite over real TLS — the only job that exercises the SSL_connect/SSL_write/SSL_read/
  # SSL_shutdown paths. GitHub service containers can't run the permission fixup the snakeoil key
  # needs, so this job drives Docker on the runner directly: start PostgreSQL with ssl=on, then run
  # `swift test` in a swift:6.0 container on a shared network, connecting with PGSSLMODE=require.
  integration-tls:
    name: Integration tests (PostgreSQL 17, TLS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL with TLS (snakeoil cert, perms fixed for the postgres user)
        run: |
          docker network create perun-tls
          docker run -d --name pg --network perun-tls \
            -e POSTGRES_USER=perun -e POSTGRES_DB=perun -e POSTGRES_HOST_AUTH_METHOD=trust \
            --entrypoint bash postgres:17 -c '
              cp /etc/ssl/certs/ssl-cert-snakeoil.pem /tmp/server.crt
              cp /etc/ssl/private/ssl-cert-snakeoil.key /tmp/server.key
              chown postgres:postgres /tmp/server.crt /tmp/server.key
              chmod 600 /tmp/server.key
              exec docker-entrypoint.sh postgres \
                -c ssl=on -c ssl_cert_file=/tmp/server.crt -c ssl_key_file=/tmp/server.key'
          ready=
          for i in $(seq 1 30); do
            if docker exec pg pg_isready -U perun -d perun >/dev/null 2>&1; then ready=1; break; fi
            sleep 1
          done
          [ -n "$ready" ] || { echo "postgres never became ready"; docker logs pg; exit 1; }
          [ "$(docker exec pg psql -U perun -d perun -tAc 'SHOW ssl;')" = on ] || { echo "ssl not on"; exit 1; }

      - name: Run the full suite over TLS
        run: |
          docker run --rm --network perun-tls -v "$PWD":/src -w /src \
            -e PERUN_PGSQL_INTEGRATION=1 -e PGHOST=pg -e PGPORT=5432 \
            -e PGUSER=perun -e PGDATABASE=perun -e PGSSLMODE=require \
            swift:6.0 bash -c 'apt-get update -qq && apt-get install -y -qq libssl-dev pkg-config && swift test'
